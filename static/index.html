<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSO Agency Trust Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; background: #f8fafc; color: #1e293b; }
    .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
    h1 { font-size: 2rem; font-weight: 700; margin-bottom: 8px; }
    .subtitle { color: #64748b; margin-bottom: 40px; }
    .card { background: white; border-radius: 16px; padding: 24px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
    .agency-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 32px; }
    .agency-btn { background: white; border: 2px solid #e2e8f0; border-radius: 12px; padding: 20px; cursor: pointer; text-align: left; transition: all 0.2s; }
    .agency-btn:hover { border-color: #3b82f6; background: #eff6ff; }
    .agency-btn.active { border-color: #3b82f6; background: #eff6ff; }
    .agency-btn h3 { font-size: 1rem; font-weight: 600; margin-bottom: 4px; }
    .agency-btn p { font-size: 0.8rem; color: #64748b; }
    .score-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
    .score-number { font-size: 3.5rem; font-weight: 700; }
    .score-green { color: #16a34a; }
    .score-orange { color: #d97706; }
    .score-red { color: #dc2626; }
    .badge { display: inline-block; padding: 6px 16px; border-radius: 999px; font-size: 0.85rem; font-weight: 600; margin-bottom: 16px; }
    .badge-green { background: #dcfce7; color: #166534; }
    .badge-orange { background: #fef3c7; color: #92400e; }
    .badge-red { background: #fee2e2; color: #991b1b; }
    .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 8px; color: #374151; }
    .analysis-text { color: #4b5563; line-height: 1.7; margin-bottom: 20px; }
    .red-flag { background: #fee2e2; border: 1px solid #fecaca; border-radius: 8px; padding: 10px 14px; margin-bottom: 8px; color: #dc2626; font-size: 0.9rem; }
    .breakdown-row { margin-bottom: 16px; }
    .breakdown-label { display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 6px; }
    .progress-bar { background: #f1f5f9; border-radius: 999px; height: 8px; }
    .progress-fill { height: 8px; border-radius: 999px; transition: width 0.5s ease; }
    .fill-green { background: #16a34a; }
    .fill-orange { background: #d97706; }
    .fill-red { background: #dc2626; }
    .warning-box { background: #fef3c7; border: 1px solid #fde68a; border-radius: 8px; padding: 12px 16px; color: #92400e; font-size: 0.9rem; margin-top: 16px; }
    .loading { text-align: center; padding: 40px; color: #64748b; }
    .spinner { width: 40px; height: 40px; border: 4px solid #e2e8f0; border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none; }
    .confidence { font-size: 0.85rem; color: #64748b; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>JSO Agency Trust Agent</h1>
    <p class="subtitle">AI-powered agency reputation analysis</p>

    <div class="agency-grid">
      <button class="agency-btn" onclick="analyze('1')" id="btn-1">
        <h3>TalentBridge</h3>
        <p>Click to analyze</p>
      </button>
      <button class="agency-btn" onclick="analyze('2')" id="btn-2">
        <h3>FireBlaze</h3>
        <p>Click to analyze</p>
      </button>
      <button class="agency-btn" onclick="analyze('3')" id="btn-3">
        <h3>AI Placed</h3>
        <p>Click to analyze</p>
      </button>
    </div>

    <div id="loading" class="card hidden">
      <div class="loading">
        <div class="spinner"></div>
        <p>Agent is analyzing agency...</p>
      </div>
    </div>

    <div id="result" class="card hidden"></div>
  </div>

  <script>
    async function analyze(agencyId) {
      document.querySelectorAll('.agency-btn').forEach(b => b.classList.remove('active'))
      document.getElementById('btn-' + agencyId).classList.add('active')
      document.getElementById('loading').classList.remove('hidden')
      document.getElementById('result').classList.add('hidden')

      try {
        const res = await fetch('/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ agency_id: agencyId })
        })
        const data = await res.json()
        renderResult(data)
      } catch(e) {
        document.getElementById('result').innerHTML = '<p style="color:red">Error: ' + e.message + '</p>'
        document.getElementById('result').classList.remove('hidden')
      } finally {
        document.getElementById('loading').classList.add('hidden')
      }
    }

    function scoreColor(score) {
      if (score >= 70) return 'score-green'
      if (score >= 40) return 'score-orange'
      return 'score-red'
    }

    function fillColor(score) {
      if (score >= 70) return 'fill-green'
      if (score >= 40) return 'fill-orange'
      return 'fill-red'
    }

    function badgeClass(rec) {
      if (rec === 'TRUSTED') return 'badge-green'
      if (rec === 'CAUTION') return 'badge-orange'
      return 'badge-red'
    }

    function renderResult(d) {
      const breakdown = [
        { label: 'Placement Rate', weight: '40%', value: d.breakdown.placement_score },
        { label: 'Reviews', weight: '30%', value: d.breakdown.review_score },
        { label: 'Response Time', weight: '20%', value: d.breakdown.response_score },
        { label: 'Verification', weight: '10%', value: d.breakdown.verification_score }
      ]

      const redFlagsHtml = d.red_flags.length
        ? d.red_flags.map(f => `<div class="red-flag">⚠ ${f}</div>`).join('')
        : ''

      const flaggedHtml = d.flagged_reviews > 0
        ? `<div class="warning-box">⚠ ${d.flagged_reviews} suspicious review(s) detected and excluded from scoring</div>`
        : ''

      document.getElementById('result').innerHTML = `
        <div class="score-header">
          <div>
            <h2 style="font-size:1.5rem;font-weight:700">${d.agency_name}</h2>
            <p class="confidence">Confidence: ${d.confidence}</p>
          </div>
          <div style="text-align:right">
            <div class="score-number ${scoreColor(d.score)}">${d.score}</div>
            <div style="color:#94a3b8;font-size:0.9rem">/ 100</div>
          </div>
        </div>

        <span class="badge ${badgeClass(d.recommendation)}">${d.recommendation}</span>

        <div class="section-title">Agent Analysis</div>
        <p class="analysis-text">${d.explanation}</p>

        <div class="section-title">Review Sentiment</div>
        <p class="analysis-text">${d.sentiment}</p>

        ${redFlagsHtml ? `<div class="section-title" style="color:#dc2626">Red Flags</div>${redFlagsHtml}` : ''}

        <div class="section-title" style="margin-top:20px">Score Breakdown</div>
        ${breakdown.map(b => `
          <div class="breakdown-row">
            <div class="breakdown-label">
              <span>${b.label} <span style="color:#94a3b8">(${b.weight})</span></span>
              <span>${b.value}/100</span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill ${fillColor(b.value)}" style="width:${b.value}%"></div>
            </div>
          </div>
        `).join('')}

        ${flaggedHtml}
      `
      document.getElementById('result').classList.remove('hidden')
    }
  </script>
</body>
</html>
